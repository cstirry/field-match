# Read the Docs configuration - https://docs.readthedocs.io/en/stable/config-file/v2.html
version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"

mkdocs:
  configuration: mkdocs.yml

python:
  install:
    # The package itself, so mkdocstrings can import it for the API reference.
    - method: pip
      path: .
    - requirements: docs_src/requirements.txt
